name: Generate site

on:
  schedule:
    # 毎日 日本時間 0:00 (UTC 15:00)
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run generate.py
        run: python generate.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "自動更新: $(date +'%Y-%m-%d') の定期生成"
          git push

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            STATUS="✅ 成功"
          else
            STATUS="❌ 失敗"
          fi
          curl -sf -X POST -H "Content-Type: application/json" \
            -d "{\"content\": \"generate.py 定期実行が完了しました: ${STATUS}\\n実行結果: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$DISCORD_WEBHOOK_URL"
